<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388bfd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main hexagon shape -->
  <polygon points="50,5 85,25 85,65 50,85 15,65 15,25" 
           fill="url(#logoGradient)" 
           stroke="#1f6feb" 
           stroke-width="2"/>
  
  <!-- Inner design elements -->
  <circle cx="50" cy="35" r="8" fill="#f0f6fc" opacity="0.9"/>
  <rect x="42" y="45" width="16" height="3" fill="#f0f6fc" opacity="0.8"/>
  <rect x="42" y="52" width="16" height="3" fill="#f0f6fc" opacity="0.7"/>
  <rect x="42" y="59" width="16" height="3" fill="#f0f6fc" opacity="0.6"/>
  
  <!-- Corner dots -->
  <circle cx="30" cy="30" r="3" fill="#58a6ff" opacity="0.6"/>
  <circle cx="70" cy="30" r="3" fill="#58a6ff" opacity="0.6"/>
  <circle cx="30" cy="70" r="3" fill="#58a6ff" opacity="0.6"/>
  <circle cx="70" cy="70" r="3" fill="#58a6ff" opacity="0.6"/>
</svg>