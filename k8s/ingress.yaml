apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: queen-signal-ingestion
  labels:
    app: queen
    component: signal-ingestion
  annotations:
    kubernetes.io/ingress.class: "gce"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.allow-http: "true"
spec:
  tls:
  - hosts:
    - queen.strategickhaos.ai
    secretName: queen-tls-cert
  rules:
  - host: queen.strategickhaos.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: queen-signal-ingestion
            port:
              number: 80
