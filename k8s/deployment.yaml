apiVersion: apps/v1
kind: Deployment
metadata:
  name: queen-signal-ingestion
  labels:
    app: queen
    component: signal-ingestion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: queen
      component: signal-ingestion
  template:
    metadata:
      labels:
        app: queen
        component: signal-ingestion
    spec:
      containers:
      - name: queen
        image: gcr.io/PROJECT_ID/queen-signal-ingestion:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
